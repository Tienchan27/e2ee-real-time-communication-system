name: ci

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  compose-validate-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose (development)
        run: |
          cp .env.example .env
          cp api-service/.env.example api-service/.env
          cp realtime-service/.env.example realtime-service/.env
          cp frontend/.env.example frontend/.env
          docker compose config

  compose-validate-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose (runtime / prod env)
        run: |
          cp .env.prod.example .env.prod
          cp api-service/.env.example api-service/.env
          cp realtime-service/.env.example realtime-service/.env
          cp frontend/.env.example frontend/.env
          docker compose -f compose.yaml --env-file .env.prod config

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api-service/package-lock.json
      - name: Build api-service
        working-directory: api-service
        run: |
          npm ci
          npm test
          npm run build

  build-realtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: realtime-service/package-lock.json
      - name: Build realtime-service
        working-directory: realtime-service
        run: |
          npm ci
          npm run build

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        service: [api-service, realtime-service, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Dependency audit (${{ matrix.service }})
        working-directory: ${{ matrix.service }}
        run: |
          npm ci
          npm audit --audit-level=high

  compose-build:
    runs-on: ubuntu-latest
    needs: [build-api, build-realtime, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          cp .env.example .env
          cp api-service/.env.example api-service/.env
          cp realtime-service/.env.example realtime-service/.env
          cp frontend/.env.example frontend/.env
          docker compose build
