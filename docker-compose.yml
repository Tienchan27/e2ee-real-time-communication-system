version: "3.9"

services:
  realtime-service:
    image: node:20-alpine
    container_name: realtime-service
    working_dir: /app
    volumes:
      - ./realtime-service:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    env_file:
      - .env
    command: sh -c "npm install && npm run dev"